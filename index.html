const BONUS_AMOUNT = 20;
const WEEK_DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const CONFETTI_COLORS = ["#FF6B6B","#FFD700","#7C5CFC","#4CAF50","#00BCD4","#FF9800","#E91E63","#00E5FF","#76FF03","#FF1744","#651FFF","#FFEA00","#1DE9B6","#FF6D00"];
const CONFETTI_SHAPES = ["■","●","▲","★","◆"];
const PIECES = Array.from({length:80},(_,i)=>({ id:i, left:Math.random()*100, shape:CONFETTI_SHAPES[i%5], color:CONFETTI_COLORS[i%CONFETTI_COLORS.length], size:10+Math.random()*18, dur:1.2+Math.random()*2, delay:Math.random()*0.8, drift:(Math.random()-.5)*120, spin:Math.random()>.5?360:-360 }));
const BURSTS = Array.from({length:6},(_,i)=>({ id:i, x:10+(i%3)*35+Math.random()*15, y:10+Math.floor(i/3)*40+Math.random()*15, color:CONFETTI_COLORS[i%CONFETTI_COLORS.length], delay:i*0.15 }));

function getTodayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekKey(ds){ const d=new Date((ds||getTodayKey())+"T12:00:00"),m=new Date(d); m.setDate(d.getDate()-((d.getDay()+6)%7)); return m.toISOString().split("T")[0]; }
function getWeekDays(wk){ const m=new Date(wk+"T12:00:00"); return Array.from({length:7},(_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return d.toISOString().split("T")[0]; }); }
function formatDate(ds){ return new Date(ds+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }
function formatWeekRange(wk){ const d=getWeekDays(wk),f=x=>new Date(x+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); return `${f(d[0])} – ${f(d[6])}`; }
function getWeekScore(gd,wk,tasks){ const today=getTodayKey(),pd=getWeekDays(wk).filter(d=>d<=today); if(!pd.length) return {pct:0}; let dn=0,tot=0; pd.forEach(d=>{ const dd=gd?.[d]||{}; tasks.forEach(t=>{ tot++; if(dd[t.id]) dn++; }); }); return {pct:tot?Math.round((dn/tot)*100):0}; }
function getStars(p){ if(p>=90)return 5; if(p>=75)return 4; if(p>=60)return 3; if(p>=40)return 2; if(p>=20)return 1; return 0; }
function mkId(){ return "k_"+Date.now()+"_"+Math.random().toString(36).slice(2,6); }

function loadData(){
  try{ const s=localStorage.getItem(STORAGE_KEY); if(s){ const d=JSON.parse(s); if(!d.kids||!d.kids.length) d.kids=DEFAULT_KIDS; return d; } } catch{}
  return { kids:DEFAULT_KIDS, days:{}, bonuses:[], unlocked:{}, customTasks:[] };
}
function saveData(d){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }catch{} }

// ── Celebration ──
function Celebration({kid,onDone}){
  const [phase,setPhase]=useState("in");
  useEffect(()=>{ const t1=setTimeout(()=>setPhase("hold"),300),t2=setTimeout(()=>setPhase("out"),3800),t3=setTimeout(onDone,4400); return ()=>{ clearTimeout(t1);clearTimeout(t2);clearTimeout(t3); }; },[]);
  return (
    <div onClick={onDone} style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",background:phase==="out"?"rgba(0,0,0,0)":"rgba(10,5,30,.93)",transition:"background .5s",cursor:"pointer",overflow:"hidden"}}>
      <style>{`
        @keyframes cFall{0%{transform:translateY(var(--sy)) rotate(0);opacity:1}80%{opacity:1}100%{transform:translateY(110vh) translateX(var(--dr)) rotate(var(--sp));opacity:0}}
        @keyframes fBurst{0%{transform:scale(0);opacity:1}60%{transform:scale(1.2);opacity:1}100%{transform:scale(2);opacity:0}}
        @keyframes heroIn{0%{transform:scale(.2) rotate(-10deg);opacity:0}60%{transform:scale(1.15) rotate(3deg);opacity:1}80%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
        @keyframes eFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
        @keyframes rSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        @keyframes sPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:1}}
        @keyframes fOut{to{opacity:0;transform:scale(.9)}}
      `}</style>
      {PIECES.map(p=><div key={p.id} style={{position:"absolute",left:`${p.left}%`,top:0,fontSize:p.size,color:p.color,"--sy":"-20px","--dr":`${p.drift}px`,"--sp":`${p.spin}deg`,animation:`cFall ${p.dur}s ease-in forwards`,animationDelay:`${p.delay}s`,pointerEvents:"none",zIndex:1001}}>{p.shape}</div>)}
      {BURSTS.map(b=><div key={b.id} style={{position:"absolute",left:`${b.x}%`,top:`${b.y}%`,width:80,height:80,borderRadius:"50%",background:`radial-gradient(circle,${b.color} 0%,transparent 70%)`,animation:`fBurst .9s ease-out forwards`,animationDelay:`${b.delay}s`,pointerEvents:"none",zIndex:1001}}/>)}
      <div style={{position:"absolute",width:300,height:300,borderRadius:"50%",opacity:.15,background:`conic-gradient(${CONFETTI_COLORS.join(",")})`,animation:"rSpin 4s linear infinite",zIndex:1001}}/>
      <div style={{position:"relative",zIndex:1002,textAlign:"center",animation:phase==="out"?"fOut .5s forwards":"heroIn .6s cubic-bezier(.34,1.56,.64,1) forwards"}}>
        <div style={{fontSize:96,animation:"eFloat 2s ease-in-out infinite",filter:`drop-shadow(0 0 20px ${kid.color})`,marginBottom:8}}>{kid.emoji}</div>
        <div style={{fontFamily:"'Fredoka One'",fontSize:48,background:"linear-gradient(135deg,#FFD700,#FF6B6B,#7C5CFC,#00E5FF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1,marginBottom:6}}>PERFECT DAY!</div>
        <div style={{fontFamily:"'Fredoka One'",fontSize:32,color:kid.color,marginBottom:12,filter:`drop-shadow(0 0 12px ${kid.color})`}}>{kid.name} 🎉</div>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:20}}>
          {[0,1,2,3,4].map(i=><div key={i} style={{fontSize:28,animation:`sPop .4s cubic-bezier(.34,1.56,.64,1) forwards`,animationDelay:`${.3+i*.08}s`,opacity:0}}>⭐</div>)}
        </div>
        <div style={{color:"rgba(255,255,255,.4)",fontSize:12,fontWeight:700,letterSpacing:1}}>TAP TO CLOSE</div>
      </div>
    </div>
  );
}

function CoinBurst({active}){
  if(!active) return null;
  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999}}>
    {[...Array(24)].map((_,i)=><div key={i} style={{position:"absolute",left:`${15+Math.random()*70}%`,top:`${10+Math.random()*50}%`,fontSize:`${18+Math.random()*20}px`,animation:`coinFall ${.8+Math.random()*.8}s ease-out forwards`,animationDelay:`${Math.random()*.3}s`}}>{Math.random()>.5?"💰":"⭐"}</div>)}
  </div>;
}

// ── Kid Form (add/edit) ──
const REWARD_OPTIONS = [1, 2, 5, 10];

function KidForm({kid, onSave, onCancel, onDelete}){
  const [name,setName]=useState(kid?.name||"");
  const [emoji,setEmoji]=useState(kid?.emoji||"🌙");
  const [colorIdx,setColorIdx]=useState(kid ? KID_COLORS.findIndex(c=>c.color===kid.color) : 0);
  const [reward,setReward]=useState(kid?.reward||1);
  const chosen = KID_COLORS[colorIdx>=0?colorIdx:0];
  const isEdit = !!kid;
  return (
    <div className="overlay" onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:28,padding:"28px 22px",maxWidth:340,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.25)",animation:"popIn .25s ease",maxHeight:"90vh",overflowY:"auto"}}>
        {/* Preview */}
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{width:72,height:72,borderRadius:20,background:chosen.color,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:40,boxShadow:`0 6px 20px ${chosen.color}55`,marginBottom:8}}>{emoji}</div>
          <div style={{fontFamily:"'Fredoka One'",fontSize:24,color:chosen.color}}>{name||"Kid's Name"}</div>
        </div>
        {/* Emoji */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:800,color:"#bbb",letterSpacing:1,marginBottom:8}}>PICK AN EMOJI</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {KID_EMOJIS.map(em=><div key={em} onClick={()=>setEmoji(em)} style={{width:40,height:40,borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:emoji===em?chosen.color:chosen.light,transition:"all .15s"}}>{em}</div>)}
          </div>
        </div>
        {/* Color */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:800,color:"#bbb",letterSpacing:1,marginBottom:8}}>PICK A COLOR</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {KID_COLORS.map((c,i)=><div key={i} onClick={()=>setColorIdx(i)} style={{width:36,height:36,borderRadius:10,cursor:"pointer",background:c.color,border:colorIdx===i?"3px solid #333":"3px solid transparent",transition:"all .15s"}}/>)}
          </div>
        </div>
        {/* Name */}
        <div style={{marginBottom:22}}>
          <div style={{fontSize:11,fontWeight:800,color:"#bbb",letterSpacing:1,marginBottom:6}}>NAME</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Sofia" maxLength={20} style={{width:"100%",padding:"12px 14px",borderRadius:12,border:`2px solid ${chosen.color}44`,fontFamily:"'Nunito'",fontSize:16,fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
        </div>
        {/* Reward */}
        <div style={{marginBottom:22}}>
          <div style={{fontSize:11,fontWeight:800,color:"#bbb",letterSpacing:1,marginBottom:8}}>🔒 SEAT BELT DAILY REWARD</div>
          <div style={{display:"flex",gap:8}}>
            {REWARD_OPTIONS.map(r=>(
              <div key={r} onClick={()=>setReward(r)} style={{flex:1,padding:"10px 0",borderRadius:12,textAlign:"center",cursor:"pointer",fontFamily:"'Fredoka One'",fontSize:18,background:reward===r?chosen.color:chosen.light,color:reward===r?"white":chosen.color,border:`2px solid ${reward===r?chosen.color:"transparent"}`,transition:"all .15s"}}>
                ${r}
              </div>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {isEdit&&onDelete&&<button onClick={onDelete} style={{padding:"12px 16px",borderRadius:14,border:"none",background:"#FFF0F0",fontFamily:"'Nunito'",fontWeight:800,fontSize:13,color:"#FF6B6B",cursor:"pointer"}}>Delete</button>}
          <button onClick={onCancel} style={{flex:1,padding:12,borderRadius:14,border:"2px solid #eee",background:"white",fontFamily:"'Nunito'",fontWeight:800,fontSize:14,color:"#bbb",cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>name.trim()&&onSave({emoji,color:chosen.color,light:chosen.light,name:name.trim(),reward})} style={{flex:2,padding:12,borderRadius:14,border:"none",background:name.trim()?`linear-gradient(135deg,${chosen.color},${chosen.color}cc)`:"#EEE",fontFamily:"'Nunito'",fontWeight:800,fontSize:14,color:name.trim()?"white":"#ccc",cursor:name.trim()?"pointer":"not-allowed"}}>{isEdit?"Save Changes":"Add Kid ✓"}</button>
        </div>
      </div>
    </div>
  );
}

// ── How To Use ──
function SplashScreen({onDone}){
  const [fading,setFading]=React.useState(false);
  const [started,setStarted]=React.useState(false);
  const vidRef=React.useRef();
  function finish(){ localStorage.setItem('lumila-splash-seen','1'); setFading(true); setTimeout(onDone,600); }
  function handleTap(){
    if(!started){
      setStarted(true);
      vidRef.current.play().then(()=>{
        const t=setTimeout(finish,3400);
        vidRef.current._timer=t;
      }).catch(finish);
    } else { finish(); }
  }
  React.useEffect(()=>{
    // Try autoplay first
    if(vidRef.current){
      vidRef.current.play().then(()=>{
        setStarted(true);
        const t=setTimeout(finish,3400);
        vidRef.current._timer=t;
      }).catch(()=>{}); // silently fail — user tap will start it
    }
  },[]);
  return (
    <div onClick={handleTap} style={{position:"fixed",inset:0,zIndex:2000,background:"#000",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"opacity .6s",opacity:fading?0:1}}>
      {!started&&<div style={{position:"absolute",zIndex:10,textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:12}}>▶️</div>
        <div style={{color:"white",fontFamily:"'Fredoka One',cursive",fontSize:22}}>Tap to start</div>
      </div>}
      <video ref={vidRef} muted playsInline style={{width:"100%",height:"100%",objectFit:"cover"}}
        onEnded={finish}
        src={VIDEO_SRC}
      />
      <div style={{position:"absolute",bottom:30,left:0,right:0,textAlign:"center",color:"rgba(255,255,255,.4)",fontSize:12,fontWeight:700,letterSpacing:1}}>TAP TO SKIP</div>
    </div>
  );
}

// ── Main App ──
function App(){
  const [data,setData]=useState(loadData);
  const [view,setView]=useState("today");
  const [burst,setBurst]=useState(false);
  const [celebrate,setCelebrate]=useState(null);
  const [bonusConfirm,setBonusConfirm]=useState(null);
  const [unlockConfirm,setUnlockConfirm]=useState(null);
  const [showAddTask,setShowAddTask]=useState(false);
  const [newTask,setNewTask]=useState({label:"",icon:"⭐",hint:""});
  const [kidForm,setKidForm]=useState(null);
  const [showVideo,setShowVideo]=useState(false); // null | "new" | kid object
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const [showAddVacTask,setShowAddVacTask]=useState(false);
  const [newVacTask,setNewVacTask]=useState({label:"",icon:"🌴"});
  const celebrated=useRef({});
  const today=getTodayKey(), cw=getWeekKey(today);

  const kids = data.kids || DEFAULT_KIDS;
  const vacationMode = !!data.vacationMode;
  const vacationTasks = data.vacationTasks || DEFAULT_VACATION_TASKS;

  useEffect(()=>{
    saveData(data);
    kids.forEach(kid=>{
      const tasks=getTasksForKid(kid.id);
      const dd=data.days?.[kid.id]?.[today]||{};
      const all=tasks.length>0&&tasks.every(t=>dd[t.id]);
      if(all&&!celebrated.current[kid.id]){ celebrated.current[kid.id]=true; setCelebrate(kid); }
      if(!all) celebrated.current[kid.id]=false;
    });
  },[data]);

  function setD(fn){ setData(prev=>{ const n=fn(prev); return n; }); }

  function getTasksForKid(kidId){
    if(data.vacationMode) return data.vacationTasks || DEFAULT_VACATION_TASKS;
    const ul=data.unlocked?.[kidId]||[];
    const disabled=data.disabledBase?.[kidId]||[];
    const extras=[...EXTRA_TASKS,...(data.customTasks||[])];
    return [...BASE_TASKS.filter(t=>!disabled.includes(t.id)),...extras.filter(t=>ul.includes(t.id))];
  }

  function toggleVacationMode(){
    setD(prev=>({...prev,vacationMode:!prev.vacationMode,vacationTasks:prev.vacationTasks||DEFAULT_VACATION_TASKS}));
  }
  function addVacTask(){
    if(!newVacTask.label.trim()) return;
    const id="vt_"+Date.now();
    setD(prev=>({...prev,vacationTasks:[...(prev.vacationTasks||DEFAULT_VACATION_TASKS),{id,label:newVacTask.label.trim(),icon:newVacTask.icon}]}));
    setNewVacTask({label:"",icon:"🌴"}); setShowAddVacTask(false);
  }
  function deleteVacTask(taskId){
    setD(prev=>({...prev,vacationTasks:(prev.vacationTasks||DEFAULT_VACATION_TASKS).filter(t=>t.id!==taskId)}));
  }

  function toggleBaseTask(kidId,taskId){
    setD(prev=>{ const cur=prev.disabledBase?.[kidId]||[]; const next=cur.includes(taskId)?cur.filter(id=>id!==taskId):[...cur,taskId]; return {...prev,disabledBase:{...prev.disabledBase,[kidId]:next}}; });
  }
  function isBaseDisabled(kidId,taskId){ return (data.disabledBase?.[kidId]||[]).includes(taskId); }

  function toggleTask(kidId,taskId){
    const wasOn=data.days?.[kidId]?.[today]?.[taskId];
    const task=getTasksForKid(kidId).find(t=>t.id===taskId);
    if(!wasOn&&task?.special){ setBurst(true); setTimeout(()=>setBurst(false),1500); }
    setD(prev=>({...prev,days:{...prev.days,[kidId]:{...prev.days?.[kidId],[today]:{...prev.days?.[kidId]?.[today],[taskId]:!wasOn}}}}));
  }

  function isUnlocked(kidId,taskId){ return (data.unlocked?.[kidId]||[]).includes(taskId); }
  function unlockTask(kidId,taskId){
    setUnlockConfirm(null);
    setD(prev=>{ const cur=prev.unlocked?.[kidId]||[]; const next=cur.includes(taskId)?cur.filter(id=>id!==taskId):[...cur,taskId]; return {...prev,unlocked:{...prev.unlocked,[kidId]:next}}; });
  }

  function addCustomTask(){
    if(!newTask.label.trim()) return;
    const id="ct_"+Date.now();
    setD(prev=>({...prev,customTasks:[...(prev.customTasks||[]),{id,label:newTask.label.trim(),icon:newTask.icon||"⭐",hint:newTask.hint.trim()}]}));
    setNewTask({label:"",icon:"⭐",hint:""}); setShowAddTask(false);
  }
  function deleteCustomTask(taskId){
    setD(prev=>{ const ul={...prev.unlocked}; Object.keys(ul).forEach(k=>{ ul[k]=(ul[k]||[]).filter(id=>id!==taskId); }); return {...prev,customTasks:(prev.customTasks||[]).filter(t=>t.id!==taskId),unlocked:ul}; });
  }
  function getAllExtraTasks(){ return [...EXTRA_TASKS,...(data.customTasks||[])]; }

  function hasBonus(kidId,wk){ return (data.bonuses||[]).some(b=>b.kidId===kidId&&b.weekKey===wk); }
  function awardBonus(kidId,wk){
    setBurst(true); setTimeout(()=>setBurst(false),2000); setBonusConfirm(null);
    setD(prev=>({...prev,bonuses:[...(prev.bonuses||[]),{kidId,weekKey:wk,amount:BONUS_AMOUNT,on:today}]}));
  }

  function getTotalEarned(kidId){
    const kid=kids.find(k=>k.id===kidId);
    const reward=kid?.reward||1;
    let t=0;
    Object.values(data.days?.[kidId]||{}).forEach(day=>BASE_TASKS.forEach(tk=>{ if(tk.earns>0&&day[tk.id]) t+=reward; }));
    (data.bonuses||[]).filter(b=>b.kidId===kidId).forEach(b=>t+=b.amount);
    return t;
  }
  function getHistoryDays(kidId){ return Object.entries(data.days?.[kidId]||{}).sort(([a],[b])=>b.localeCompare(a)).slice(0,14); }
  function getAllWeeks(){ const s=new Set([cw]); kids.forEach(k=>Object.keys(data.days?.[k.id]||{}).forEach(d=>s.add(getWeekKey(d)))); return [...s].sort((a,b)=>b.localeCompare(a)); }

  // Kid management
  function saveKid(kidData){
    if(kidForm==="new"){
      const id=mkId();
      setD(prev=>({...prev,kids:[...(prev.kids||DEFAULT_KIDS),{id,...kidData}]}));
    } else {
      setD(prev=>({...prev,kids:(prev.kids||DEFAULT_KIDS).map(k=>k.id===kidForm.id?{...k,...kidData}:k)}));
    }
    setKidForm(null);
  }
  function deleteKid(kidId){
    setD(prev=>{
      const kids=(prev.kids||DEFAULT_KIDS).filter(k=>k.id!==kidId);
      const days={...prev.days}; delete days[kidId];
      const ul={...prev.unlocked}; delete ul[kidId];
      const bonuses=(prev.bonuses||[]).filter(b=>b.kidId!==kidId);
      return {...prev,kids,days,unlocked:ul,bonuses};
    });
    setDeleteConfirm(null); setKidForm(null);
  }

  const allWeeks=getAllWeeks();
  const totalOwed=kids.reduce((s,k)=>s+getTotalEarned(k.id),0);

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#FFF8F0 0%,#F0EAFF 100%)",fontFamily:"'Nunito',sans-serif",paddingBottom:80}}>
      <style>{`
        @keyframes coinFall{0%{transform:translateY(-20px) scale(.5) rotate(0);opacity:1}100%{transform:translateY(80px) scale(1.2) rotate(360deg);opacity:0}}
        @keyframes popIn{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
        @keyframes perfectGlow{0%,100%{box-shadow:0 0 20px rgba(255,215,0,.4),0 4px 20px rgba(0,0,0,.07)}50%{box-shadow:0 0 40px rgba(255,215,0,.8),0 4px 20px rgba(0,0,0,.07)}}
        @keyframes rainbowBorder{0%{border-color:#FF6B6B}16%{border-color:#FFD700}33%{border-color:#7C5CFC}50%{border-color:#4CAF50}66%{border-color:#00E5FF}83%{border-color:#FF9800}100%{border-color:#FF6B6B}}
        .task-btn{transition:all .15s;cursor:pointer} .task-btn:active{transform:scale(.95)}
        .nav-btn{transition:all .2s;cursor:pointer;border:none}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
        .perfect-card{animation:perfectGlow 1.5s ease-in-out infinite,rainbowBorder 2s linear infinite !important;border-width:2.5px !important}
        .kid-chip{cursor:pointer;transition:all .2s} .kid-chip:active{transform:scale(.95)}
      `}</style>

      {celebrate&&<Celebration kid={celebrate} onDone={()=>setCelebrate(null)}/>}
      <CoinBurst active={burst}/>

      {/* Kid Form Modal */}

                </div>
                <div style={{display:"flex",gap:10}}>
                  <div style={{flex:1,background:"#FFF5D6",borderRadius:14,padding:"12px",textAlign:"center"}}><div style={{fontFamily:"'Fredoka One'",fontSize:22,color:"#C8860A"}}>${sb}</div><div style={{fontSize:11,fontWeight:700,color:"#bbb"}}>🔒 BELT</div></div>
                  <div style={{flex:1,background:"#E8F5E9",borderRadius:14,padding:"12px",textAlign:"center"}}><div style={{fontFamily:"'Fredoka One'",fontSize:22,color:"#2E7D32"}}>${bon}</div><div style={{fontSize:11,fontWeight:700,color:"#bbb"}}>🏆 BONUS</div></div>
                  <div style={{flex:1,background:kid.light,borderRadius:14,padding:"12px",textAlign:"center"}}><div style={{fontFamily:"'Fredoka One'",fontSize:22,color:kid.color}}>${total.toFixed(0)}</div><div style={{fontSize:11,fontWeight:700,color:"#bbb"}}>TOTAL</div></div>
                </div>
              </div>
            ); })}
            <div style={{background:"linear-gradient(135deg,#7C5CFC,#FF6B6B)",borderRadius:24,padding:"20px",textAlign:"center",boxShadow:"0 8px 24px rgba(124,92,252,.3)"}}>
              <div style={{color:"rgba(255,255,255,.7)",fontSize:11,fontWeight:700,letterSpacing:1}}>PAPA OWES TOTAL</div>
              <div style={{fontFamily:"'Fredoka One'",fontSize:52,color:"white"}}>${totalOwed.toFixed(0)}</div>
              <div style={{color:"rgba(255,255,255,.7)",fontSize:12}}>💸 Pay up, Dad!</div>
            </div>
          </div>
        )}

        {/* HISTORY */}
        {view==="history"&&(
          <div>
            {kids.map(kid=>(
              <div key={kid.id} style={{marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{fontSize:20}}>{kid.emoji}</span>
                  <span style={{fontFamily:"'Fredoka One'",fontSize:20,color:kid.color}}>{kid.name}</span>
                </div>
                {getHistoryDays(kid.id).length===0?<div style={{color:"#ccc",fontSize:13,textAlign:"center",padding:20}}>No history yet</div>:(
                  getHistoryDays(kid.id).map(([date,dd])=>{
                    const tasks=getTasksForKid(kid.id),done=tasks.filter(t=>dd[t.id]),earned=dd.seatbelt?(kid.reward||1):0,perf=done.length===tasks.length&&tasks.length>0;
                    return (
                      <div key={date} style={{background:perf?"linear-gradient(135deg,#fffef0,#fff8e0)":"white",borderRadius:16,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:perf?"0 2px 14px rgba(255,215,0,.25)":"0 2px 10px rgba(0,0,0,.05)",border:perf?"1.5px solid #FFD700":"1.5px solid transparent"}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:13,color:"#333",display:"flex",alignItems:"center",gap:6}}>{date===today?"Today":formatDate(date)}{perf&&<span>🏆</span>}</div>
                          <div style={{fontSize:18,marginTop:2}}>{done.map(t=>t.icon).join(" ")||"—"}</div>
                        </div>
                        {earned>0&&<div style={{background:"#FFF5D6",border:"1.5px solid #FFD700",borderRadius:10,padding:"4px 10px",fontFamily:"'Fredoka One'",fontSize:16,color:"#C8860A"}}>+${earned.toFixed(0)}</div>}
                      </div>
                    );
                  })
                )}
              </div>
            ))}
          </div>
        )}

        {/* MANAGE TASKS */}
        {view==="manage"&&(
          <div style={{animation:"slideUp .3s ease"}}>
            {/* How to Use */}
            <div onClick={()=>setShowVideo(true)} style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",borderRadius:20,padding:"20px",marginBottom:16,display:"flex",alignItems:"center",gap:16,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,.15)"}}>
              <div style={{width:52,height:52,borderRadius:14,background:"rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>🎬</div>
              <div>
                <div style={{fontFamily:"'Fredoka One'",fontSize:20,color:"white",marginBottom:2}}>How to Use</div>
                <div style={{color:"rgba(255,255,255,.5)",fontSize:12,fontWeight:700}}>Watch the quick intro video</div>
              </div>
              <div style={{marginLeft:"auto",color:"rgba(255,255,255,.3)",fontSize:22}}>▶</div>
            </div>


            {/* Add vacation task modal */}
            {showAddVacTask&&(
              <div className="overlay" onClick={()=>setShowAddVacTask(false)}>
                <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:28,padding:"28px 22px",maxWidth:340,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.25)",animation:"popIn .25s ease"}}>
                  <div style={{fontFamily:"'Fredoka One'",fontSize:22,color:"#FF9800",marginBottom:20,textAlign:"center"}}>🌴 Add Adventure</div>
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:800,color:"#bbb",letterSpacing:1,marginBottom:8}}>PICK AN ICON</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                      {VACATION_ICONS.map(em=>(
                        <div key={em} onClick={()=>setNewVacTask(p=>({...p,icon:em}))} style={{width:36,height:36,borderRadius:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,background:newVacTask.icon===em?"#FF9800":"#F5F5F5",transition:"all .15s"}}>{em}</div>
                      ))}
                    </div>
                  </div>
                  <div style={{marginBottom:22}}>
                    <div style={{fontSize:11,fontWeight:800,color:"#bbb",letterSpacing:1,marginBottom:6}}>ACTIVITY NAME</div>
                    <input value={newVacTask.label} onChange={e=>setNewVacTask(p=>({...p,label:e.target.value}))} placeholder="e.g. Swim in the ocean" maxLength={30} style={{width:"100%",padding:"10px 14px",borderRadius:12,border:"2px solid #FFE0B2",fontFamily:"'Nunito'",fontSize:15,fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setShowAddVacTask(false)} style={{flex:1,padding:12,borderRadius:14,border:"2px solid #eee",background:"white",fontFamily:"'Nunito'",fontWeight:800,fontSize:14,color:"#bbb",cursor:"pointer"}}>Cancel</button>
                    <button onClick={addVacTask} style={{flex:2,padding:12,borderRadius:14,border:"none",background:newVacTask.label.trim()?"linear-gradient(135deg,#FF9800,#FF5722)":"#EEE",fontFamily:"'Nunito'",fontWeight:800,fontSize:14,color:newVacTask.label.trim()?"white":"#ccc",cursor:newVacTask.label.trim()?"pointer":"not-allowed"}}>Add ✓</button>
                  </div>
                </div>
              </div>
            )}

            {/* Vacation Mode Toggle */}
            <div onClick={toggleVacationMode} style={{
              background:vacationMode?"linear-gradient(135deg,#FF9800,#FF5722,#E91E63)":"linear-gradient(135deg,#1a1a2e,#16213e)",
              borderRadius:20,padding:"20px 24px",marginBottom:20,cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"space-between",
              boxShadow:vacationMode?"0 8px 24px rgba(255,152,0,.4)":"0 4px 16px rgba(0,0,0,.2)",
              transition:"all .4s",
            }}>
              <div>
                <div style={{fontFamily:"'Fredoka One'",fontSize:22,color:"white",marginBottom:2}}>
                  {vacationMode?"🌴 Vacation Mode ON":"🏠 Normal Mode"}
                </div>
                <div style={{color:"rgba(255,255,255,.6)",fontSize:12,fontWeight:700}}>
                  {vacationMode?"Tap to go back to school mode":"Tap to start vacation adventures"}
                </div>
              </div>
              <div style={{
                width:52,height:30,borderRadius:15,padding:"3px",
                background:vacationMode?"rgba(255,255,255,.3)":"rgba(255,255,255,.1)",
                display:"flex",alignItems:"center",justifyContent:vacationMode?"flex-end":"flex-start",
                transition:"all .3s",
              }}>
                <div style={{width:24,height:24,borderRadius:12,background:"white",boxShadow:"0 2px 6px rgba(0,0,0,.3)"}}/>
              </div>
            </div>

            {/* Vacation task editor */}
            {vacationMode&&(
              <div style={{marginBottom:24}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingLeft:4}}>
                  <div style={{fontFamily:"'Fredoka One'",fontSize:16,color:"#FF9800"}}>🌊 ADVENTURE LIST</div>
                  <button onClick={()=>setShowAddVacTask(true)} style={{background:"linear-gradient(135deg,#FF9800,#FF5722)",border:"none",borderRadius:12,padding:"8px 14px",fontFamily:"'Nunito'",fontWeight:800,fontSize:13,color:"white",cursor:"pointer"}}>+ Add Adventure</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {vacationTasks.map(task=>(
                    <div key={task.id} style={{background:"white",borderRadius:16,padding:"14px 16px",boxShadow:"0 2px 12px rgba(255,152,0,.1)",border:"2px solid #FFE0B2",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#FFF3E0,#FFE0B2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{task.icon}</div>
                        <div style={{fontWeight:800,fontSize:14,color:"#333"}}>{task.label}</div>
                      </div>
                      <button onClick={()=>deleteVacTask(task.id)} style={{width:30,height:30,borderRadius:8,border:"none",cursor:"pointer",background:"#FFF0F0",color:"#FF6B6B",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:12,background:"rgba(255,152,0,.08)",borderRadius:14,padding:"12px 16px",border:"1.5px dashed #FFB74D"}}>
                  <div style={{fontSize:12,color:"#FF9800",fontWeight:700,textAlign:"center"}}>
                    ✨ All adventures done = PERFECT DAY explosion!
                  </div>
                </div>
              </div>
            )}

            {!vacationMode&&(<>
            <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",borderRadius:20,padding:"20px",marginBottom:20,textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:6}}>🔐</div>
              <div style={{fontFamily:"'Fredoka One'",fontSize:22,color:"white",marginBottom:4}}>Task Manager</div>
              <div style={{color:"rgba(255,255,255,.5)",fontSize:12,fontWeight:700}}>MANAGE YOUR FAMILY APP</div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
              {kids.map(kid=>{ const tasks=getTasksForKid(kid.id),ec=(data.unlocked?.[kid.id]||[]).length; return (
                <div key={kid.id} style={{flex:1,minWidth:80,background:"white",borderRadius:16,padding:"14px",textAlign:"center",boxShadow:"0 2px 12px rgba(0,0,0,.06)",border:`2px solid ${kid.light}`}}>
                  <div style={{fontSize:24,marginBottom:4}}>{kid.emoji}</div>
                  <div style={{fontFamily:"'Fredoka One'",fontSize:16,color:kid.color}}>{kid.name}</div>
                  <div style={{fontFamily:"'Fredoka One'",fontSize:26,color:kid.color,lineHeight:1}}>{tasks.length}</div>
                  <div style={{fontSize:10,color:"#bbb",fontWeight:700}}>TASKS</div>
                  {ec>0&&<div style={{marginTop:4,background:kid.light,borderRadius:6,padding:"2px 6px",fontSize:10,color:kid.color,fontWeight:800}}>{ec} unlocked</div>}
                </div>
              ); })}
            </div>
            {/* BASE TASKS — toggle per kid */}
            <div style={{fontFamily:"'Fredoka One'",fontSize:16,color:"#999",marginBottom:12,paddingLeft:4}}>DAILY TASKS</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
              {BASE_TASKS.map(task=>(
                <div key={task.id} style={{background:"white",borderRadius:18,padding:"14px 16px",boxShadow:"0 2px 12px rgba(0,0,0,.05)",border:"2px solid #F5F5F5"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                      <div style={{width:42,height:42,borderRadius:12,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{task.icon}</div>
                      <div>
                        <div style={{fontWeight:800,fontSize:14,color:"#333"}}>{task.label}</div>
                        {task.special&&<div style={{fontSize:11,color:"#C8860A",fontWeight:700}}>Earns money 💰</div>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:5,flexShrink:0}}>
                      {kids.map(kid=>{ const off=isBaseDisabled(kid.id,task.id); return (
                        <button key={kid.id} onClick={()=>toggleBaseTask(kid.id,task.id)} title={`${off?"Enable":"Disable"} for ${kid.name}`} style={{width:36,height:36,borderRadius:9,border:"none",cursor:"pointer",background:off?"#F0F0F0":kid.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,transition:"all .2s",boxShadow:off?"none":`0 3px 10px ${kid.color}55`,opacity:off?0.5:1}}>
                          {off?"✕":kid.emoji}
                        </button>
                      ); })}
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{fontFamily:"'Fredoka One'",fontSize:16,color:"#999",marginBottom:12,paddingLeft:4}}>EXTRA TASK LIBRARY</div>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
              <button onClick={()=>setShowAddTask(true)} style={{background:"linear-gradient(135deg,#7C5CFC,#FF6B6B)",border:"none",borderRadius:12,padding:"8px 14px",fontFamily:"'Nunito'",fontWeight:800,fontSize:13,color:"white",cursor:"pointer"}}>+ Add Task</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
              {getAllExtraTasks().map(task=>{ const isC=task.id.startsWith("ct_"); return (
                <div key={task.id} style={{background:"white",borderRadius:18,padding:"14px 16px",boxShadow:"0 2px 12px rgba(0,0,0,.05)",border:isC?"2px solid #EDE8FF":"2px solid #F5F5F5"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
                      <div style={{width:42,height:42,borderRadius:12,background:isC?"#EDE8FF":"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{task.icon}</div>
                      <div style={{minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:14,color:"#333",display:"flex",alignItems:"center",gap:6}}>{task.label}{isC&&<span style={{fontSize:9,background:"#7C5CFC",color:"white",borderRadius:4,padding:"1px 5px",fontWeight:800}}>CUSTOM</span>}</div>
                        <div style={{fontSize:11,color:"#bbb"}}>{task.hint}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                      {kids.map(kid=>{ const on=isUnlocked(kid.id,task.id); return (
                        <button key={kid.id} onClick={()=>setUnlockConfirm({kidId:kid.id,taskId:task.id})} title={kid.name} style={{width:36,height:36,borderRadius:9,border:"none",cursor:"pointer",background:on?kid.color:"#F0F0F0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,transition:"all .2s",boxShadow:on?`0 3px 10px ${kid.color}55`:"none"}}>{on?kid.emoji:"🔒"}</button>
                      ); })}
                      {isC&&<button onClick={()=>deleteCustomTask(task.id)} style={{width:30,height:30,borderRadius:8,border:"none",cursor:"pointer",background:"#FFF0F0",color:"#FF6B6B",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}
                    </div>
                  </div>
                </div>
              ); })}
            </div>
            </>)}
          </div>
        )}

      </div>
      <div style={{height:20}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
